version: '3.5'

services:
  frontend:
    image: ghcr.io/espoon-voltti/oppivelvollisuus/frontend:${TAG:-master}
    build:
      context: ../frontend/
    ports:
      - "9000:80"
    environment:
      RESOLVER: "127.0.0.11 ipv6=off"
      API_GATEWAY_URL: http://api-gateway:3000
      HTTP_SCHEME: http
      RATE_LIMIT_CIDR_WHITELIST: "0.0.0.0/0"
    depends_on:
      - api-gateway

  api-gateway:
    image: ghcr.io/espoon-voltti/oppivelvollisuus/api-gateway:${TAG:-master}
    build:
      context: ../api-gateway/
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: local
      HTTP_PORT: 3000
      BASE_URL: http://frontend
      SERVICE_URL: http://service-e2e-tests:8080
      JWT_KID: "oppivelvollisuus-api-gateway"
      JWT_PRIVATE_KEY: "config/test-cert/jwt_private_key.pem"
      AD_MOCK: "true"
      COOKIE_SECRET: cookie_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DISABLE_SECURITY: "true"
    depends_on:
      - redis

  service-e2e-tests:
    image: ghcr.io/espoon-voltti/oppivelvollisuus/service-builder:${TAG:-master}
    build:
      context: ../service/
      target: builder
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: -server -Djava.security.egd=file:/dev/./urandom -Xms1024m -Xss512k -Xmx1024m -XX:TieredStopAtLevel=1
      APP_DATABASE_URL: jdbc:postgresql://oppivelvollisuus-db:5432/oppivelvollisuus_it
      APP_DATABASE_USERNAME: oppivelvollisuus
      APP_DATABASE_PASSWORD: postgres
      E2E_ENV: docker
    entrypoint: ./e2e-test-entrypoint.sh
    volumes:
      - ./screenshots:/app/screenshots
    depends_on:
      - oppivelvollisuus-db
